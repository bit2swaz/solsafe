services:
  - type: web
    name: solsafe-bot
    runtime: node
    plan: free
    buildCommand: npm install --legacy-peer-deps --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    autoDeploy: true
    buildFilter:
      paths:
        - src/**
        - package.json
        - package-lock.json
        - tsconfig.json
        - tsconfig.build.json
        - render.yaml
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.20.0
      - key: BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: HELIUS_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SIWS_ORIGIN
        sync: false